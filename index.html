<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Points Noirs — Districts d'Oujda</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--ink:#1c2430;--line:#dfe4ea;--muted:#6b7686;--accent:#0a5c4a;--bg:#f4f6f8;}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);background:var(--bg)}
#map{position:fixed;inset:0;z-index:1}
/* Top bar shared by district tabs AND nature tabs — same design/placement */
.topbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:1000;
 display:flex;gap:10px;flex-wrap:nowrap;justify-content:center;max-width:calc(100vw - 320px);
 overflow-x:auto;padding:2px}
.topbar.hidden{display:none}
#naturebar{flex-wrap:wrap;overflow-x:visible;max-width:calc(100vw - 380px);row-gap:8px}
#naturebar .tab{padding:7px 13px;font-size:12.5px}
.tab{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border:1px solid var(--line);
 border-radius:12px;box-shadow:0 6px 20px rgba(20,30,45,.12);cursor:pointer;font-weight:650;font-size:13.5px;
 transition:transform .12s,box-shadow .12s,opacity .12s;user-select:none;white-space:nowrap;flex:0 0 auto}
.tab:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(20,30,45,.18)}
.tab .dot{width:13px;height:13px;border-radius:4px;border:1px solid rgba(0,0,0,.15);flex:0 0 auto}
.tab .cnt{font-size:11px;color:var(--muted);font-weight:600;background:var(--bg);padding:1px 7px;border-radius:8px}
.tab.off{opacity:.42}
.back{position:absolute;top:14px;left:14px;z-index:1001;display:none;align-items:center;gap:7px;
 padding:9px 15px;background:#fff;border:1px solid var(--line);border-radius:12px;
 box-shadow:0 6px 20px rgba(20,30,45,.14);cursor:pointer;font-weight:650;font-size:13px}
.back.show{display:flex}
#home{left:14px}
#back{left:70px}
#tabhost{display:contents}
#burger,#drawerbg{display:none}
.sheetgrab{display:none}
.stats{position:absolute;top:14px;right:14px;bottom:14px;z-index:1000;width:316px;max-width:calc(100vw - 28px);
 background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 34px rgba(20,30,45,.16);
 overflow:hidden;display:none;flex-direction:column}
.stats.show{display:flex}
.stats header{padding:16px 18px 12px;background:linear-gradient(135deg,var(--accent),#0d7a61)}
.stats header h2{margin:0;font-size:15px;color:#fff;font-weight:700}
.stats header .sub{margin:3px 0 0;font-size:12px;color:rgba(255,255,255,.85)}
.stats .total{padding:11px 18px;display:flex;gap:24px;border-bottom:1px solid var(--line)}
.statnat{display:none;padding:12px 18px 2px}
.statnat.show{display:block}
.statnat .nb{display:inline-flex;align-items:center;gap:8px;padding:5px 13px;border-radius:20px;color:#fff;font-weight:700;font-size:12.5px}
.statnat .nb .d{width:9px;height:9px;border-radius:50%;background:#fff;display:inline-block}
.stats .total .metric{display:flex;flex-direction:column;gap:2px}
.stats .total .n{font-size:30px;font-weight:800;color:var(--accent);line-height:1}
.stats .total .l{font-size:11.5px;color:var(--muted);font-weight:600}
.chartwrap{padding:14px 16px 6px;border-bottom:1px solid var(--line)}
.chartwrap canvas{max-height:172px}
.stats .body{padding:8px 12px 14px;flex:1;overflow:hidden}
.srow{display:flex;align-items:center;gap:10px;padding:5px 6px}
.bcount{padding:12px 18px 4px;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line)}
.bcount b{color:var(--accent);font-size:15px}
.blrow{display:flex;align-items:center;gap:8px;padding:4px 6px;font-size:12px;font-weight:600;border-bottom:1px solid #f0f2f5;cursor:pointer;border-radius:8px}
.blrow:hover{background:var(--bg)}
.blrow.sel{background:var(--bg)}
.blrow .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.blrow .bnm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.blrow.sel .bnm{color:var(--accent);font-weight:700}
.srow .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
.srow .nm{flex:1;font-size:12.5px;font-weight:600}
.srow .bar{height:8px;border-radius:5px;min-width:4px;transition:width .4s}
.srow .v{font-size:12.5px;font-weight:700;width:22px;text-align:right}
.barwrap{flex:1;background:var(--bg);border-radius:5px;overflow:hidden}
.leaflet-tooltip.lbl{background:rgba(255,255,255,.82);border:none;box-shadow:none;font-weight:700;
 font-size:12px;color:#1c2430;padding:2px 6px}
.leaflet-tooltip.alabel{background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.12);box-shadow:0 1px 4px rgba(0,0,0,.1);
 font-weight:700;font-size:11px;color:#1c2430;padding:2px 6px;border-radius:5px}
.pn-pop b{font-size:13px}.pn-pop{font-size:12px;line-height:1.5}
.dbody{padding:16px 18px;overflow:auto;flex:1}
.dbody .field{margin-bottom:14px}
.dbody .flabel{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:4px}
.dbody .fval{font-size:14px;font-weight:600}
.dbody .natbadge{display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border-radius:20px;color:#fff;font-weight:700;font-size:13px}
.dbody img{width:100%;height:190px;object-fit:cover;border-radius:12px;border:1px solid var(--line);margin-top:2px;background:var(--bg);cursor:zoom-in;display:block}
.slider{position:relative;margin-top:2px;height:190px}
.slider .sstage,.slider .sstage img{height:190px}
.slider .sstage img{width:100%;object-fit:cover;margin-top:0}
#lightbox{position:fixed;inset:0;z-index:3000;display:none;align-items:center;justify-content:center;background:rgba(10,15,22,.86)}
#lightbox.show{display:flex}
#lightbox img{max-width:90vw;max-height:80vh;width:auto;height:auto;border-radius:10px;box-shadow:0 12px 46px rgba(0,0,0,.6);background:#0a0f16}
#lbclose{position:absolute;top:16px;right:18px;width:46px;height:46px;border:none;border-radius:50%;background:rgba(255,255,255,.92);color:#111;font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.35)}
#lbclose:hover{background:#fff}
#baseswitch{position:fixed;left:14px;bottom:16px;z-index:2200;display:flex;background:rgba(255,255,255,.94);border-radius:22px;box-shadow:0 4px 16px rgba(20,30,45,.28);overflow:hidden;font-family:inherit}
#baseswitch .bs{border:none;background:transparent;padding:9px 16px;font-size:13px;font-weight:700;color:#48566a;cursor:pointer}
#baseswitch .bs.on{background:var(--accent,#0a5c4a);color:#fff}
.lbnav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border:none;border-radius:50%;background:rgba(255,255,255,.9);color:#111;font-size:26px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.lbnav:hover{background:#fff}
#lbprev{left:18px}#lbnext{right:18px}
#lbcount{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(10,15,22,.7);color:#fff;font-size:13px;font-weight:700;padding:4px 12px;border-radius:12px}
.snav{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border:none;border-radius:50%;
 background:rgba(28,36,48,.55);color:#fff;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.snav:hover{background:rgba(28,36,48,.85)}
.sprev{left:8px}.snext{right:8px}
.scount{position:absolute;bottom:8px;right:8px;background:rgba(28,36,48,.72);color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px}
.dbody .maps{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;padding:11px;
 background:var(--accent);color:#fff;border-radius:12px;font-weight:700;font-size:13.5px;text-decoration:none}
.dbody .maps:hover{background:#0d7a61}
.hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:1000;
 background:rgba(28,36,48,.85);color:#fff;padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:500}
#tload{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:1200;display:none;
 align-items:center;gap:9px;background:rgba(28,36,48,.92);color:#fff;padding:9px 16px;border-radius:20px;
 font-size:12.5px;font-weight:600;box-shadow:0 6px 20px rgba(20,30,45,.25)}
#tload.show{display:flex}
#tload .sp{width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:680px){
  /* Panneaux (stats + fiche) en feuille du bas glissable */
  .stats{top:auto;left:6px;right:6px;bottom:6px;width:auto;max-width:none;max-height:40vh;border-radius:18px 18px 16px 16px}
  .stats .body{overflow:auto}
  .stats header{padding:6px 16px 9px}
  .dbody{padding:12px 16px 16px}
  .chartwrap{display:none}
  .stats .total{padding:9px 18px}
  .stats .total .n{font-size:24px}
  .statnat{padding:8px 18px 0}
  .sheetgrab{display:block;padding:8px 0 2px;cursor:grab;touch-action:none}
  .sheetgrab span{display:block;width:44px;height:5px;border-radius:3px;background:#c7ced6;margin:0 auto}
  /* Fond de carte : haut droite, toujours visible */
  #baseswitch{top:10px;right:8px;left:auto;bottom:auto;z-index:2300}
  #baseswitch .bs{padding:8px 13px;font-size:12px}
  /* Boutons accueil / retour (flottants, compacts) */
  .back{top:10px;padding:8px 11px;font-size:13px}
  #home{left:58px}
  #back{left:116px}
  .bk-tx{display:none}      /* retour = flèche seule */
  /* Burger + tiroir contenant districts/natures */
  #burger{display:flex;position:fixed;top:10px;left:8px;z-index:2400;width:42px;height:42px;
    align-items:center;justify-content:center;border:none;border-radius:12px;background:#fff;
    box-shadow:0 6px 20px rgba(20,30,45,.16);font-size:20px;cursor:pointer;color:#1c2430}
  #burger .bico{font-size:20px;line-height:1}
  #burger .blabel{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 3px;
    border-radius:9px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.35)}
  #drawerbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2550}
  #drawerbg.open{display:block}
  #tabhost{display:block;position:fixed;top:0;left:0;bottom:0;width:82%;max-width:300px;background:#fff;
    z-index:2600;transform:translateX(-100%);transition:transform .25s ease;overflow-y:auto;
    padding:58px 12px 20px;box-shadow:2px 0 22px rgba(0,0,0,.28)}
  #tabhost.open{transform:none}
  #tabhost .topbar{position:static;left:auto;right:auto;top:auto;transform:none;max-width:none;width:100%;
    display:flex;flex-direction:column;gap:8px;overflow:visible;flex-wrap:nowrap;margin:0;padding:0}
  #tabhost .topbar.hidden{display:none}
  #tabhost .tab{width:100%;justify-content:flex-start;font-size:14px;padding:11px 14px}
  /* Photos plus compactes */
  .dbody img,.slider,.slider .sstage,.slider .sstage img{height:150px}
  /* Message d'aide */
  .hint{font-size:12px;max-width:calc(100vw - 24px);text-align:center;left:50%;transform:translateX(-50%)}
  /* Lightbox */
  .lbnav{width:40px;height:40px;font-size:22px}
  #lbprev{left:8px}#lbnext{right:8px}
  #lbclose{top:10px;right:10px;width:40px;height:40px}
}
</style></head><body>
<div id="map"></div>
<button id="burger" type="button" aria-label="Menu"><span class="bico">☰</span><span class="blabel" id="blabel">D</span></button>
<div id="drawerbg"></div>
<div class="back" id="home" style="padding:9px 12px;font-size:16px">🏠</div>
<div class="back" id="back"><span class="bk-ic">←</span><span class="bk-tx"> Retour</span></div>
<div id="tabhost">
  <div class="topbar" id="topbar"></div>
  <div class="topbar hidden" id="naturebar"></div>
</div>
<div class="stats" id="stats">
 <div class="sheetgrab"><span></span></div>
 <header><h2 id="stitle">District</h2><p class="sub">Points noirs par nature</p></header>
 <div class="statnat" id="statnat"></div>
 <div class="total">
   <div class="metric"><span class="n" id="stotal">0</span><span class="l">points noirs</span></div>
   <div class="metric"><span class="n" id="sboul">0</span><span class="l">boulevards concernés</span></div>
 </div>
 <div class="chartwrap"><canvas id="chart"></canvas></div>
 <div class="body" id="sbody"></div>
</div>
<div class="stats" id="detail">
 <div class="sheetgrab"><span></span></div>
 <header><h2 id="dtitle">Point noir</h2><p class="sub" id="dsub">Détail</p></header>
 <div class="dbody" id="dbody"></div>
</div>
<div class="hint" id="hint">Clique sur une étiquette de district pour l'explorer</div>
<div id="tload"><span class="sp"></span><span id="tloadtxt">Tracé des boulevards…</span></div>
<div id="baseswitch"><button type="button" class="bs on" data-l="osm">Plan</button><button type="button" class="bs" data-l="sat">Satellite</button></div>
<div id="lightbox"><button id="lbclose" type="button" title="Fermer">✕</button><button id="lbprev" class="lbnav" type="button">‹</button><img id="lbimg" alt="photo"><button id="lbnext" class="lbnav" type="button">›</button><div id="lbcount"></div></div>

// Chart.js plugin: draw % on each slice
const pctPlugin={id:'pct',afterDatasetsDraw(c){
  const{ctx}=c;const ds=c.data.datasets[0];const total=ds.data.reduce((a,b)=>a+b,0);
  if(!total)return;
  const meta=c.getDatasetMeta(0);
  ctx.save();ctx.font='700 12px system-ui';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  meta.data.forEach((arc,i)=>{
    const v=ds.data[i];if(!v)return;const p=Math.round(v/total*100);
    if(p<6)return;
    const pos=arc.tooltipPosition();
    ctx.fillText(p+'%',pos.x,pos.y);
  });
  ctx.restore();
}};

    if(map.hasLayer(districtLayers[d.name]))map.removeLayer(districtLayers[d.name]);

function shade(hex,p){let n=parseInt(hex.slice(1),16),r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;
 r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
 return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');}
function clearAnnexes(){Object.values(annexeLayers).forEach(l=>map.removeLayer(l));annexeLayers={};}
function clearPoints(){pointMarkers.forEach(m=>map.removeLayer(m));pointMarkers=[];}
let boulevardLayers=[];
let boulReq=0;
function clearBoulevards(){boulReq++;boulevardLayers.forEach(l=>map.removeLayer(l));boulevardLayers=[];}
function cleanBoulevard(b){return (b||'').replace(/^\s*\d+\s*-\s*/,'').trim();}
function searchName(b){return cleanBoulevard(b).replace(/\s*\(.*?\)\s*/g,' ').replace(/\s+/g,' ').trim();}
function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
const OVP=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter','https://maps.mail.ru/osm/tools/overpass/api/interpreter'];
const ovpCache={};
let ovpPending=0;
function ovpLoad(on){ovpPending=Math.max(0,ovpPending+(on?1:-1));const el=document.getElementById('tload');if(ovpPending>0){el.querySelector('.sp').style.display='';document.getElementById('tloadtxt').textContent='Tracé des boulevards…';el.classList.add('show');}else if(!el.classList.contains('msg')){el.classList.remove('show');}}
let flashT=null;
function flashTrace(msg){
  const el=document.getElementById('tload');
  el.querySelector('.sp').style.display='none';
  document.getElementById('tloadtxt').textContent=msg;
  el.classList.add('show','msg');
  clearTimeout(flashT);
  flashT=setTimeout(()=>{el.classList.remove('show','msg');el.querySelector('.sp').style.display='';},3000);
}
function fetchTimeout(url,ms){
  const ctl=new AbortController();const t=setTimeout(()=>ctl.abort(),ms);
  return fetch(url,{signal:ctl.signal}).finally(()=>clearTimeout(t));
}
const LSK='pnovp:';
const ovpInflight={};
function lsGet(q){try{const v=localStorage.getItem(LSK+q);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(q,d){try{localStorage.setItem(LSK+q,JSON.stringify(d));}catch(e){}}
function overpass(q,silent){
  if(ovpCache[q])return Promise.resolve(ovpCache[q]);
  const saved=lsGet(q);
  if(saved){ovpCache[q]=saved;return Promise.resolve(saved);}   // déjà téléchargé -> pas de nouvel appel
  if(!silent)ovpLoad(true);
  const done=()=>{if(!silent)ovpLoad(false);};
  if(ovpInflight[q])return ovpInflight[q].then(v=>{done();return v;},e=>{done();throw e;});
  let i=0;
  const one=()=>fetchTimeout(OVP[i]+'?data='+encodeURIComponent(q),5000).then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{
      const slim={elements:(d.elements||[]).filter(e=>e.geometry).map(e=>({geometry:e.geometry,tags:(e.tags&&e.tags.name)?{name:e.tags.name}:undefined}))};
      ovpCache[q]=slim;lsSet(q,slim);return slim;                // sauvegarde persistante
    })
    .catch(()=>{i++;if(i<OVP.length)return one();throw 0;});
  const pr=one().finally(()=>{delete ovpInflight[q];});
  ovpInflight[q]=pr;
  return pr.then(v=>{done();return v;},e=>{done();throw e;});
}
// Précharge en tâche de fond (parallèle) les tracés de toutes les natures + boulevards d'un district
function prefetchDistrict(name){
  if(WAYS.length)return;                                         // hors-ligne : rien à précharger
  const b=districtLayers[name].getBounds();const PAD=0.012;
  const bbox=`${b.getSouth()-PAD},${b.getWest()-PAD},${b.getNorth()+PAD},${b.getEast()+PAD}`;
  const pts=ptsOfDistrict(name);
  const jobs=[];
  [...new Set(pts.map(p=>p.nature))].forEach(nat=>{
    const nm=[...new Set(pts.filter(p=>p.nature===nat).map(p=>searchName(p.boulevard)).filter(Boolean))];
    if(nm.length)jobs.push(`[out:json][timeout:25];way[highway][name~"${nm.map(esc).join('|')}",i](${bbox});out geom;`);
  });
  [...new Set(pts.map(p=>searchName(p.boulevard)).filter(Boolean))].forEach(nm=>{
    jobs.push(`[out:json][timeout:25];way[highway][name~"${esc(nm)}",i](${bbox});out geom;`);
  });
  let idx=0,active=0;const CONC=4;                               // parallélisme limité (évite le rate-limit)
  (function pump(){
    while(active<CONC&&idx<jobs.length){
      active++;const q=jobs[idx++];
      overpass(q,true).catch(()=>{}).finally(()=>{active--;pump();});
    }
  })();
}
// --- Tracés persistants intégrés (remplis par telecharger_traces.py) ---
const WAYS=(window.WAYS||[]);
function normName(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
function waysFor(names){
  const q=names.map(normName).filter(Boolean);
  return WAYS.filter(w=>{const wn=normName(w.name);return q.some(n=>wn.indexOf(n)>=0);});
}
function loadBoulevards(name){
  clearBoulevards();
  const names=[...new Set(ptsOfDistrict(name)
    .filter(p=>natureState[p.nature]!==false)
    .map(p=>searchName(p.boulevard)).filter(Boolean))];
  if(!names.length)return;
  const myReq=boulReq;
  const draw=(elts)=>{
    if(current!==name||myReq!==boulReq)return;
    elts.forEach(w=>{
      const g=w.ll||(w.geometry&&w.geometry.map(x=>[x.lat,x.lon]));
      if(!g)return;
      const casing=L.polyline(g,{color:'#fff',weight:8,opacity:.9}).addTo(map);
      const line=L.polyline(g,{color:'#111827',weight:4.5,opacity:.95}).addTo(map);
      line.bindTooltip(w.name||(w.tags&&w.tags.name)||'Boulevard',{sticky:true});
      boulevardLayers.push(casing,line);
    });
    pointMarkers.forEach(m=>m.bringToFront());
  };
  if(WAYS.length){draw(waysFor(names));return;}          // hors-ligne : calques intégrés
  const b=districtLayers[name].getBounds();
  const PAD=0.012;
  const bbox=`${b.getSouth()-PAD},${b.getWest()-PAD},${b.getNorth()+PAD},${b.getEast()+PAD}`;
  const q=`[out:json][timeout:25];way[highway][name~"${names.map(esc).join('|')}",i](${bbox});out geom;`;
  overpass(q).then(d=>draw(d.elements||[])).catch(()=>{if(current===name&&myReq===boulReq)flashTrace('Tracés indisponibles (réseau) — réessaie');});
}
function driveId(u){const m=(u||'').match(/[-\w]{25,}/);return m?m[0]:null;}
function loadOneBoulevard(bname,districtName){
  clearBoulevards();
  const nm=searchName(bname);if(!nm)return;
  const myReq=boulReq;
  const draw=(elts)=>{
    if(myReq!==boulReq)return;
    elts.forEach(w=>{
      const g=w.ll||(w.geometry&&w.geometry.map(x=>[x.lat,x.lon]));
      if(!g)return;
      boulevardLayers.push(L.polyline(g,{color:'#fff',weight:10,opacity:.95}).addTo(map));
      const line=L.polyline(g,{color:'#ff2d2d',weight:5.5,opacity:1}).addTo(map);
      line.bindTooltip(w.name||(w.tags&&w.tags.name)||nm,{sticky:true});
      boulevardLayers.push(line);
    });
    pointMarkers.forEach(m=>m.bringToFront());
  };
  if(WAYS.length){draw(waysFor([nm]));return;}           // hors-ligne : calques intégrés
  const b=districtLayers[districtName].getBounds();
  const PAD=0.012;
  const bbox=`${b.getSouth()-PAD},${b.getWest()-PAD},${b.getNorth()+PAD},${b.getEast()+PAD}`;
  const q=`[out:json][timeout:25];way[highway][name~"${esc(nm)}",i](${bbox});out geom;`;
  overpass(q).then(d=>draw(d.elements||[])).catch(()=>{if(myReq===boulReq)flashTrace('Tracé indisponible (réseau) — réessaie');});
}
function openPoint(p){
  pushHistory();
  const c=ncolor(p.nature);
  // zoom on point, offset for right panel
  map.fitBounds([[p.lat,p.lng],[p.lat,p.lng]],padOpts(18));
  loadOneBoulevard(p.boulevard,current);
  // detail panel
  document.getElementById('stats').classList.remove('show');
  document.getElementById('detail').classList.add('show');
  document.querySelector('#detail header').style.background=`linear-gradient(135deg,${c},${shade(c,-18)})`;
  document.getElementById('dtitle').textContent=p.id;
  document.getElementById('dsub').textContent=p.district;
  const maps=p.lat!=null?`https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`:(p.loc||'#');
  const desc=(p.desc&&p.desc!=='**')?`<div class="field"><div class="flabel">Description</div><div class="fval" style="font-weight:500">${p.desc}</div></div>`:'';
  document.getElementById('dbody').innerHTML=`
    <div class="field"><div class="flabel">Nature du point noir</div>
      <span class="natbadge" style="background:${c}"><span style="width:9px;height:9px;border-radius:50%;background:#fff;display:inline-block"></span>${p.nature}</span></div>
    <div class="field"><div class="flabel">Boulevard</div><div class="fval">${p.boulevard}</div></div>
    ${desc}
    <div id="photoslot"></div>
    <a class="maps" href="${maps}" target="_blank">📍 Ouvrir dans Google Maps</a>`;
  const photos=(p.photos||[]).filter(Boolean);
  if(photos.length)document.getElementById('photoslot').appendChild(renderPhotos(photos));
  document.getElementById('home').classList.add('show');
  document.getElementById('back').classList.add('show');
}
function dImg(id){return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;}
function dThumb(id){return `https://lh3.googleusercontent.com/d/${id}=w1000`;}
function dBig(id){return `https://drive.google.com/thumbnail?id=${id}&sz=w1600`;}
function dOpen(id){return `https://drive.google.com/file/d/${id}/view`;}
let LB={list:[],idx:0};
function lbRender(){
  document.getElementById('lbimg').src=LB.list[LB.idx];
  const multi=LB.list.length>1;
  document.getElementById('lbprev').style.display=multi?'':'none';
  document.getElementById('lbnext').style.display=multi?'':'none';
  const cc=document.getElementById('lbcount');
  cc.style.display=multi?'':'none';cc.textContent=(LB.idx+1)+' / '+LB.list.length;
}
function openLightbox(list,idx){
  LB={list:list.slice(),idx:idx||0};
  lbRender();
  document.getElementById('lightbox').classList.add('show');
}
function lbStep(d){if(LB.list.length<2)return;LB.idx=(LB.idx+d+LB.list.length)%LB.list.length;lbRender();}
function closeLightbox(){const lb=document.getElementById('lightbox');lb.classList.remove('show');document.getElementById('lbimg').removeAttribute('src');}
document.getElementById('lbclose').onclick=closeLightbox;
document.getElementById('lbprev').onclick=e=>{e.stopPropagation();lbStep(-1);};
document.getElementById('lbnext').onclick=e=>{e.stopPropagation();lbStep(1);};
document.getElementById('lightbox').onclick=function(e){if(e.target.id==='lightbox')closeLightbox();};
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('show'))return;
  if(e.key==='Escape')closeLightbox();
  else if(e.key==='ArrowLeft')lbStep(-1);
  else if(e.key==='ArrowRight')lbStep(1);
});
// switch de fond de carte (toujours visible)
document.querySelectorAll('#baseswitch .bs').forEach(b=>b.onclick=()=>setBase(b.dataset.l));
function bigOf(v){return /^(data:|https?:)/.test(v)?v:dBig(v);}
function photoImg(v){
  const im=document.createElement('img');im.alt='photo';im.loading='lazy';
  const isUrl=/^(data:|https?:)/.test(v);
  im.style.cursor='zoom-in';
  if(isUrl){ im.src=v; return im; }                        // image intégrée ou URL directe
  const srcs=[dImg(v),dThumb(v)];let i=0;
  im.src=srcs[0];
  im.onerror=function(){
    i++;
    if(i<srcs.length){this.src=srcs[i];}
    else{const d=document.createElement('div');d.className='fval';d.style.color='#9aa';d.style.fontSize='12px';d.textContent='Photo indisponible';this.replaceWith(d);}
  };
  return im;
}
function renderPhotos(photos){
  const wrap=document.createElement('div');wrap.className='field';
  const lab=document.createElement('div');lab.className='flabel';
  lab.textContent=photos.length>1?`Photos (${photos.length})`:'Photo';
  wrap.appendChild(lab);
  const bigs=photos.map(bigOf);
  if(photos.length===1){
    const im=photoImg(photos[0]);
    im.addEventListener('click',()=>openLightbox(bigs,0));
    wrap.appendChild(im);return wrap;
  }
  const box=document.createElement('div');box.className='slider';
  const stage=document.createElement('div');stage.className='sstage';
  const cnt=document.createElement('div');cnt.className='scount';
  let idx=0;
  const show=()=>{
    stage.innerHTML='';
    const im=photoImg(photos[idx]);
    im.addEventListener('click',()=>openLightbox(bigs,idx));
    stage.appendChild(im);
    cnt.textContent=`${idx+1} / ${photos.length}`;
  };
  const prev=document.createElement('button');prev.className='snav sprev';prev.type='button';prev.innerHTML='‹';
  prev.onclick=()=>{idx=(idx-1+photos.length)%photos.length;show();};
  const next=document.createElement('button');next.className='snav snext';next.type='button';next.innerHTML='›';
  next.onclick=()=>{idx=(idx+1)%photos.length;show();};
  box.appendChild(stage);box.appendChild(prev);box.appendChild(next);box.appendChild(cnt);
  wrap.appendChild(box);show();
  return wrap;
}
function hideDetail(){document.getElementById('detail').classList.remove('show');}
function drawPoints(name){
  clearPoints();
  ptsOfDistrict(name).forEach(p=>{
    if(p.lat==null)return;
    if(natureState[p.nature]===false)return;
    if(boulFilter&&cleanBoulevard(p.boulevard)!==boulFilter)return;
    const c=ncolor(p.nature);
    const m=L.circleMarker([p.lat,p.lng],{radius:9,color:'#fff',weight:2,fillColor:c,fillOpacity:.95}).addTo(map);
    m.on('click',()=>openPoint(p));
    pointMarkers.push(m);
  });
  pointMarkers.forEach(m=>m.bringToFront());
}
// Nature tabs — same .tab design/placement as districts
function buildNatureBar(name){
  const bar=document.getElementById('naturebar');bar.innerHTML='';
  const counts={};ptsOfDistrict(name).forEach(p=>counts[p.nature]=(counts[p.nature]||0)+1);
  const natList=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  natList.forEach(nat=>{if(natureState[nat]===undefined)natureState[nat]=true;});
  function syncTabs(){
    [...bar.children].forEach(t=>t.classList.toggle('off',natureState[t.dataset.nat]===false));
  }
  natList.forEach(nat=>{
    const c=ncolor(nat);
    const t=document.createElement('div');t.className='tab'+(natureState[nat]?'':' off');t.dataset.nat=nat;t.style.borderColor=c;
    t.innerHTML=`<span class="dot" style="background:${c};border-radius:50%"></span>${nat}<span class="cnt">${counts[nat]}</span>`;
    t.onclick=()=>{
      const activeNow=natList.filter(n=>natureState[n]!==false);
      const isOnlyThis=activeNow.length===1&&activeNow[0]===nat;
      pushHistory();
      boulFilter=null;
      if(isOnlyThis){natList.forEach(n=>natureState[n]=true);}      // reclic -> toutes les natures
      else{natList.forEach(n=>natureState[n]=(n===nat));}           // isole cette nature
      syncTabs();
      backToDistrict();          // dézoom + quitte la fiche point si ouverte
      drawPoints(name);
      loadBoulevards(name);      // retrace les boulevards de la sélection
      buildStats(name);
    };
    bar.appendChild(t);
  });
}
function refreshReset(){}
function buildStats(name){
  document.getElementById('stitle').textContent=name;
  const all=ptsOfDistrict(name);
  const counts={};all.forEach(p=>counts[p.nature]=(counts[p.nature]||0)+1);
  const natActive=all.filter(p=>natureState[p.nature]!==false);
  document.getElementById('stotal').textContent=natActive.length;
  const boulSet=new Set(natActive.map(p=>cleanBoulevard(p.boulevard)).filter(Boolean));
  document.getElementById('sboul').textContent=boulSet.size;
  const chartwrap=document.querySelector('.chartwrap');
  const body=document.getElementById('sbody');body.innerHTML='';
  if(chart){chart.destroy();chart=null;}
  const anyOff=Object.keys(natureState).some(k=>natureState[k]===false);
  const statnat=document.getElementById('statnat');
  const activeNat=Object.keys(natureState).filter(k=>natureState[k]!==false);
  if(anyOff&&activeNat.length){
    const c=ncolor(activeNat[0]);
    statnat.innerHTML=`<span class="nb" style="background:${c}"><span class="d"></span>${activeNat.join(', ')}</span>`;
    statnat.classList.add('show');
  }else{statnat.classList.remove('show');statnat.innerHTML='';}
  if(anyOff){
    // nature isolée -> pas de camembert : total + liste cliquable des boulevards concernés
    chartwrap.style.display='none';
    const cc=activeNat.length===1?ncolor(activeNat[0]):'#0a5c4a';
    const boulList=[...new Set(natActive.map(p=>cleanBoulevard(p.boulevard)).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    const head=document.createElement('div');head.className='bcount';
    head.innerHTML=`Boulevards concernés :`;
    body.appendChild(head);
    if(!boulList.length){body.insertAdjacentHTML('beforeend','<p style="color:#6b7686;font-size:12.5px;padding:10px 6px">Aucun boulevard concerné.</p>');return;}
    boulList.forEach(bn=>{
      const sel=boulFilter===bn;
      const row=document.createElement('div');row.className='blrow'+(sel?' sel':'');
      row.innerHTML=`<span class="dot" style="background:${cc}"></span><span class="bnm">${bn}</span>`;
      row.onclick=()=>{
        pushHistory();
        boulFilter=sel?null:bn;
        drawPoints(current);
        if(boulFilter){
          loadOneBoulevard(bn,current);
          const ll=natActive.filter(p=>cleanBoulevard(p.boulevard)===bn&&p.lat!=null).map(p=>[p.lat,p.lng]);
          if(ll.length)map.fitBounds(ll,padOpts(17));
        }else{loadBoulevards(current);backToDistrict();}
        buildStats(current);
      };
      body.appendChild(row);
    });
    return;
  }
  // toutes les natures -> camembert + barres par nature
  chartwrap.style.display='';
  const labels=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const data=labels.map(l=>counts[l]);
  const cols=labels.map(l=>ncolor(l));
  if(labels.length&&window.Chart){
    chart=new Chart(document.getElementById('chart'),{
      type:'doughnut',
      data:{labels,datasets:[{data,backgroundColor:cols,borderColor:'#fff',borderWidth:2}]},
      options:{plugins:{legend:{position:'bottom',labels:{boxWidth:11,font:{size:11},padding:8}},
        tooltip:{callbacks:{label:(x)=>{const t=x.dataset.data.reduce((a,b)=>a+b,0);
          return ` ${x.label}: ${x.raw} (${Math.round(x.raw/t*100)}%)`;}}}},
        cutout:'55%',responsive:true,maintainAspectRatio:true}
    });
  }
  const max=Math.max(1,...data);
  labels.forEach(nat=>{
    const c=ncolor(nat);const v=counts[nat];
    const row=document.createElement('div');row.className='srow';
    row.innerHTML=`<span class="dot" style="background:${c}"></span><span class="nm">${nat}</span>
      <div class="barwrap"><div class="bar" style="width:${v/max*100}%;background:${c}"></div></div>
      <span class="v">${v}</span>`;
    body.appendChild(row);
  });
  if(!labels.length)body.innerHTML='<p style="color:#6b7686;font-size:12.5px;padding:8px 6px">Aucun point noir recensé dans ce district.</p>';
}
function renderAll(){
  current=null;natureState={};
  clearAnnexes();clearPoints();clearBoulevards();if(chart){chart.destroy();chart=null;}
  GEO.districts.forEach(d=>{
    districtLayers[d.name].setStyle({opacity:1,fillOpacity:.14});
    if(!map.hasLayer(districtLayers[d.name]))districtLayers[d.name].addTo(map);
    if(!map.hasLayer(districtLabels[d.name]))districtLabels[d.name].addTo(map);
  });
  restyleBorders();
  map.fitBounds(FULL,{padding:[10,10]});
  document.getElementById('topbar').classList.remove('hidden');
  document.getElementById('naturebar').classList.add('hidden');
  document.getElementById('back').classList.remove('show');
  document.getElementById('home').classList.remove('show');
  document.getElementById('stats').classList.remove('show');
  document.getElementById('detail').classList.remove('show');
  document.getElementById('hint').style.display='';
  setBurger('D');
  if(typeof closeDrawer==='function')closeDrawer();
}
document.getElementById('back').onclick=goBack;
document.getElementById('home').onclick=()=>{history=[];renderAll();};

// ---- Menu burger (mobile) : districts / natures ----
const tabhost=document.getElementById('tabhost'), drawerbg=document.getElementById('drawerbg');
function openDrawer(){tabhost.classList.add('open');drawerbg.classList.add('open');}
function closeDrawer(){tabhost.classList.remove('open');drawerbg.classList.remove('open');}
document.getElementById('burger').onclick=()=>{tabhost.classList.contains('open')?closeDrawer():openDrawer();};
function setBurger(l){const b=document.getElementById('blabel');if(b)b.textContent=l;document.getElementById('burger').setAttribute('aria-label',l==='N'?'Menu natures':'Menu districts');}
drawerbg.onclick=closeDrawer;
tabhost.addEventListener('click',e=>{if(e.target.closest('.tab'))closeDrawer();});

// ---- Feuille du bas glissable (mobile) : tirer vers le haut pour agrandir ----
function makeSheetDraggable(sheet){
  const grab=sheet.querySelector('.sheetgrab');if(!grab)return;
  let sy=0,sh=0,drag=false;
  const clamp=h=>Math.max(window.innerHeight*0.22,Math.min(window.innerHeight*0.9,h));
  grab.addEventListener('pointerdown',e=>{drag=true;sy=e.clientY;sh=sheet.getBoundingClientRect().height;sheet.style.transition='none';try{grab.setPointerCapture(e.pointerId);}catch(_){}});
  grab.addEventListener('pointermove',e=>{if(!drag)return;const h=clamp(sh+(sy-e.clientY));sheet.style.height=h+'px';sheet.style.maxHeight=h+'px';});
  const end=()=>{if(!drag)return;drag=false;sheet.style.transition='';const h=sheet.getBoundingClientRect().height;const big=h>window.innerHeight*0.52;const t=Math.round((big?0.86:0.40)*window.innerHeight);sheet.style.height=t+'px';sheet.style.maxHeight=t+'px';};
  grab.addEventListener('pointerup',end);grab.addEventListener('pointercancel',end);
}
makeSheetDraggable(document.getElementById('stats'));
makeSheetDraggable(document.getElementById('detail'));

let _rz;
window.addEventListener('resize',()=>{clearTimeout(_rz);_rz=setTimeout(()=>{
  map.invalidateSize();
  if(window.innerWidth>680){
    ['stats','detail'].forEach(id=>{const s=document.getElementById(id);s.style.height='';s.style.maxHeight='';});
    closeDrawer();
  }
  if(current)map.fitBounds(districtLayers[current].getBounds(),padOpts(17));
  else map.fitBounds(FULL,{padding:[10,10]});
},250);});
drawAll();buildTabs();
